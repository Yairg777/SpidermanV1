<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo-Link Duel: Fixed Physics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', sans-serif;
        }

        #video_container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        #ui {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00f2ff;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            letter-spacing: 1px;
        }

        .status-pill {
            display: inline-block;
            padding: 5px 12px;
            background: rgba(0, 40, 60, 0.6);
            border: 1px solid #00f2ff;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
        }

        /* DUEL UI */
        #duel-header {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
            z-index: 10;
        }
        #timer { font-size: 40px; font-weight: bold; color: #ff3300; margin: 0; }
        .score-board { font-size: 20px; text-shadow: 0 0 10px #00f2ff; }

        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            color: #00f2ff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 242, 255, 0.2);
            border-top: 3px solid #00f2ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>CALIBRATING NEURAL LINK...</div>
    </div>

    <div id="duel-header">
        <p id="timer">30</p>
        <div class="score-board">YOU: <span id="score1">0</span> | ENEMY: <span id="score2">0</span></div>
    </div>

    <div id="ui">
        <h1 style="margin:0; font-weight: 300;">HOLO-LINK <span style="font-size: 15px; vertical-align: middle; opacity: 0.7;">v5.0</span></h1>
        <div id="hand-count" class="status-pill">SEARCHING FOR HANDS...</div>
    </div>

    <div id="instructions">
        <b>PINCH</b> to grab • <b>TWO HAND PINCH</b> same object to scale • <b>SLAP</b> objects for points
    </div>

    <div id="video_container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- CONSTANTS & STATE ---
        const PINCH_THRESHOLD = 0.035; 
        const objects = [];
        let initialScaleDist = 0;
        let initialObjectScale = new THREE.Vector3();
        
        let timeLeft = 30;
        let scores = [0, 0];
        let gameActive = true;
        let winnerIndex = -1;

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00f2ff, 150);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // --- INTERACTIVE OBJECTS ---
        const geometries = [
            new THREE.BoxGeometry(1.5, 1.5, 1.5),
            new THREE.IcosahedronGeometry(1.2, 0),
            new THREE.TorusGeometry(1, 0.3, 16, 32)
        ];

        for (let i = 0; i < 6; i++) {
            const mat = new THREE.MeshPhongMaterial({
                color: 0x0088ff,
                emissive: 0x002244,
                transparent: true,
                opacity: 0.8,
            });
            const mesh = new THREE.Mesh(geometries[i % geometries.length], mat);
            mesh.position.set((Math.random() - 0.5) * 12, (Math.random() - 0.5) * 8, (Math.random() - 0.5) * 5);
            
            mesh.userData = {
                velocity: new THREE.Vector3(),
                rotVelocity: new THREE.Vector3(Math.random()*0.02, Math.random()*0.02, 0),
                isGrabbed: false,
                grabbedBy: [] // Track which hands are pinching this
            };
            
            scene.add(mesh);
            objects.push(mesh);
        }

        // --- HAND VISUALIZER ---
        const createHandModel = (color) => {
            const group = new THREE.Group();
            const joints = [];
            const jointMat = new THREE.MeshBasicMaterial({ color: color });
            for(let i=0; i<21; i++) {
                const j = new THREE.Mesh(new THREE.SphereGeometry(0.12), jointMat);
                joints.push(j);
                group.add(j);
            }
            const lines = [];
            const connections = [[0,1,2,3,4], [0,5,6,7,8], [5,9,10,11,12], [9,13,14,15,16], [13,17,18,19,20], [0,17]];
            connections.forEach(() => {
                const g = new THREE.BufferGeometry();
                const l = new THREE.Line(g, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.5 }));
                lines.push({ line: l, indices: [] });
                group.add(l);
            });
            scene.add(group);
            return { group, joints, lines, connections, color };
        };

        const handModels = [createHandModel(0x00f2ff), createHandModel(0xff0055)];

        // --- UTILS ---
        const raycaster = new THREE.Raycaster();
        function getPinchDist(landmarks) {
            const thumb = landmarks[4];
            const index = landmarks[8];
            return Math.sqrt(Math.pow(thumb.x - index.x, 2) + Math.pow(thumb.y - index.y, 2) + Math.pow(thumb.z - index.z, 2));
        }

        function mapToScene(lm) {
            const x = (1 - lm.x) * 2 - 1;
            const y = -(lm.y * 2 - 1);
            const vector = new THREE.Vector3(x, y, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z + (lm.z * -15);
            return camera.position.clone().add(dir.multiplyScalar(distance));
        }

        // --- GAME TIMER ---
        const timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
            } else {
                gameActive = false;
                clearInterval(timerInterval);
                winnerIndex = scores[0] > scores[1] ? 0 : 1;
                document.getElementById('timer').innerText = "FINISH!";
            }
        }, 1000);

        // --- MEDIAPIPE ---
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        hands.onResults((results) => {
            document.getElementById('loading-screen').style.display = 'none';
            handModels.forEach(m => m.group.visible = false);
            objects.forEach(obj => obj.userData.grabbedBy = []);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                document.getElementById('hand-count').innerText = `${results.multiHandLandmarks.length} HANDS CONNECTED`;
                
                const currentPinchingHands = [];

                results.multiHandLandmarks.forEach((landmarks, hIdx) => {
                    const model = handModels[hIdx];
                    model.group.visible = true;

                    // Winner Rainbow Effect
                    if (!gameActive && hIdx === winnerIndex) {
                        const hue = (Date.now() * 0.001) % 1;
                        model.joints.forEach(j => j.material.color.setHSL(hue, 1, 0.5));
                    }

                    const worldJoints = landmarks.map(lm => mapToScene(lm));
                    worldJoints.forEach((pos, jIdx) => model.joints[jIdx].position.copy(pos));
                    model.connections.forEach((indices, lIdx) => {
                        model.lines[lIdx].line.geometry.setFromPoints(indices.map(i => worldJoints[i]));
                    });

                    const indexTip = worldJoints[8];
                    const thumbTip = worldJoints[4];
                    const isPinching = getPinchDist(landmarks) < PINCH_THRESHOLD;

                    // Raycasting for Grab
                    const screenX = (1 - landmarks[8].x) * 2 - 1;
                    const screenY = -(landmarks[8].y * 2 - 1);
                    raycaster.setFromCamera({ x: screenX, y: screenY }, camera);
                    const intersects = raycaster.intersectObjects(objects);

                    if (isPinching) {
                        let target = objects.find(o => o.userData.isGrabbed && o.userData.grabbedBy.includes(hIdx));
                        
                        // If not already holding something, try to grab
                        if (!target && intersects.length > 0) {
                            target = intersects[0].object;
                            target.userData.isGrabbed = true;
                        }

                        if (target) {
                            target.userData.grabbedBy.push(hIdx);
                            currentPinchingHands.push({ handIdx: hIdx, obj: target, pos: indexTip });
                        }
                    } else {
                        // Slapping logic (collision when not pinching)
                        if (gameActive) {
                            intersects.forEach(hit => {
                                if (!hit.object.userData.isGrabbed) {
                                    scores[hIdx]++;
                                    document.getElementById(`score${hIdx+1}`).innerText = scores[hIdx];
                                    hit.object.userData.velocity.set((Math.random()-0.5), (Math.random()-0.5), (Math.random()-0.5)).multiplyScalar(2);
                                }
                            });
                        }
                    }
                });

                // --- RESOLVE MOVING AND SCALING ---
                objects.forEach(obj => {
                    const grabbers = currentPinchingHands.filter(h => h.obj === obj);
                    
                    if (grabbers.length === 2) {
                        // SCALING LOGIC (Two hands on one object)
                        const handA = grabbers[0].pos;
                        const handB = grabbers[1].pos;
                        const dist = handA.distanceTo(handB);

                        if (initialScaleDist === 0) {
                            initialScaleDist = dist;
                            initialObjectScale.copy(obj.scale);
                        } else {
                            const ratio = dist / initialScaleDist;
                            const s = Math.max(0.2, Math.min(initialObjectScale.x * ratio, 5));
                            obj.scale.set(s, s, s);
                        }
                        // Position at midpoint
                        obj.position.lerp(handA.clone().add(handB).multiplyScalar(0.5), 0.2);
                        obj.userData.velocity.set(0,0,0);

                    } else if (grabbers.length === 1) {
                        // MOVING LOGIC (Single hand)
                        const hand = grabbers[0];
                        const prevPos = obj.position.clone();
                        obj.position.lerp(hand.pos, 0.2);
                        obj.userData.velocity.copy(obj.position).sub(prevPos);
                        initialScaleDist = 0; // Reset scale tracker
                    } else {
                        obj.userData.isGrabbed = false;
                    }
                });

            } else {
                document.getElementById('hand-count').innerText = "SEARCHING FOR HANDS...";
                initialScaleDist = 0;
            }
        });

        const videoElement = document.getElementById('input_video');
        const camMP = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 1280, height: 720
        });
        camMP.start();

        function animate() {
            requestAnimationFrame(animate);
            objects.forEach(obj => {
                if (!obj.userData.isGrabbed || obj.userData.grabbedBy.length === 0) {
                    obj.position.add(obj.userData.velocity);
                    obj.rotation.x += obj.userData.rotVelocity.x;
                    obj.rotation.y += obj.userData.rotVelocity.y;
                    obj.userData.velocity.multiplyScalar(0.96);
                    
                    if(obj.userData.velocity.length() < 0.01) {
                        obj.position.y += Math.sin(Date.now() * 0.001 + obj.id) * 0.002;
                    }

                    if (Math.abs(obj.position.x) > 15) obj.userData.velocity.x *= -1;
                    if (Math.abs(obj.position.y) > 10) obj.userData.velocity.y *= -1;
                }
            });
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
