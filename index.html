<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo-Link DUEL</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #video_container { position: absolute; width: 100vw; height: 100vh; overflow: hidden; z-index: -1; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* UI */
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; pointer-events: none; }
        
        /* HP BARS */
        #battle-hud {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            display: none; flex-direction: row; gap: 40px; z-index: 10;
        }
        .hp-box { text-align: center; color: #00f2ff; width: 200px; }
        .hp-bar-bg { width: 100%; height: 15px; background: rgba(255,255,255,0.1); border: 1px solid #00f2ff; margin-top: 5px; border-radius: 10px; overflow: hidden; }
        .hp-bar-fill { width: 100%; height: 100%; background: #00f2ff; transition: width 0.3s; box-shadow: 0 0 15px #00f2ff; }
        .enemy-fill { background: #ff0055; box-shadow: 0 0 15px #ff0055; }

        #multiplayer-hub {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0, 10, 20, 0.8); border: 1px solid #00f2ff;
            padding: 15px; border-radius: 10px; color: #00f2ff; width: 180px; z-index: 20;
        }
        button { width: 100%; padding: 8px; background: #00f2ff; border: none; cursor: pointer; font-weight: bold; margin-top: 5px; }
        input { width: 100%; background: #000; border: 1px solid #00f2ff; color: #fff; padding: 5px; box-sizing: border-box; }

        #sidebar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; }
        .menu-btn { width: 70px; height: 70px; background: rgba(0, 20, 30, 0.6); border: 1px solid #00f2ff; border-radius: 8px; color: #00f2ff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 9px; text-align: center; }
        .menu-btn.active { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        .duel-btn { border-color: #ff0055; color: #ff0055; }
        .duel-btn.active { background: #ff0055; color: #000; box-shadow: 0 0 20px #ff0055; }

        #hit-flash { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,0,0,0.4); display:none; pointer-events:none; z-index: 50; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #00f2ff; display: flex; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>

    <div id="hit-flash"></div>
    <div id="loading-screen">INITIALIZING NEURAL LINK...</div>

    <div id="battle-hud">
        <div class="hp-box">
            <div>PLAYER (YOU)</div>
            <div class="hp-bar-bg"><div id="my-hp-fill" class="hp-bar-fill"></div></div>
        </div>
        <div class="hp-box">
            <div>OPPONENT</div>
            <div class="hp-bar-bg"><div id="enemy-hp-fill" class="hp-bar-fill enemy-fill"></div></div>
        </div>
    </div>

    <div id="multiplayer-hub">
        <div id="setup-controls">
            <button onclick="initMultiplayer(true)">CREATE ROOM</button>
            <input type="text" id="join-code" placeholder="CODE" style="margin-top:10px">
            <button onclick="initMultiplayer(false)">JOIN ROOM</button>
        </div>
        <div id="room-display" style="display:none">ROOM: <span id="room-id-text">----</span></div>
    </div>

    <div id="ui">
        <h1 style="margin:0; font-size: 18px;">HOLO-LINK <span style="color:#ff0055">DUEL</span></h1>
    </div>

    <div id="sidebar">
        <div class="menu-btn active" id="btn-shapes" onclick="app.switchMode('shapes')">SHAPES</div>
        <div class="menu-btn" id="btn-earth" onclick="app.switchMode('earth')">EARTH</div>
        <div class="menu-btn duel-btn" id="btn-duel" onclick="app.switchMode('duel')">DUEL MODE</div>
    </div>

    <div id="video_container"><video id="input_video" autoplay playsinline></video></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        // --- GAME STATE ---
        let myHP = 100;
        let enemyHP = 100;
        let peer, conn;
        let lastHitTime = 0;

        // --- THREE.JS ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.z = 12;
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        // Remote Ghost Hand and Core
        const remoteHand = new THREE.Group();
        const remoteCore = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xff0055, transparent: true, opacity: 0.5}));
        remoteHand.add(remoteCore);
        scene.add(remoteHand);

        window.app = {
            objects: [],
            mode: 'shapes',
            switchMode: (newMode, broadcast = true) => {
                app.mode = newMode;
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-' + newMode).classList.add('active');
                document.getElementById('battle-hud').style.display = (newMode === 'duel') ? 'flex' : 'none';
                
                app.objects.forEach(o => scene.remove(o));
                app.objects = [];
                
                if(newMode === 'shapes') spawnShapes();
                if(newMode === 'earth') spawnEarth();
                if(newMode === 'duel') spawnDuelWeapons();
                
                if(broadcast && conn) conn.send({type: 'mode', value: newMode});
            }
        };

        // --- WEAPON FACTORY ---
        function createWeapon(type) {
            const group = new THREE.Group();
            let blade, damage, length;

            if (type === 'knife') {
                blade = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.5, 8), new THREE.MeshPhongMaterial({color: 0xcccccc}));
                damage = 10; length = 1.5;
            } else if (type === 'sword') {
                blade = new THREE.Mesh(new THREE.BoxGeometry(0.3, 4, 0.1), new THREE.MeshPhongMaterial({color: 0x00f2ff}));
                damage = 20; length = 4;
            } else { // Lightsaber
                blade = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 5), new THREE.MeshPhongMaterial({color: 0xffffff, emissive: 0xff0055}));
                damage = 35; length = 5;
            }
            
            blade.position.y = length / 2;
            group.add(blade);
            group.userData = { isWeapon: true, damage: damage, length: length, tipPos: new THREE.Vector3() };
            return group;
        }

        function spawnDuelWeapons() {
            const w1 = createWeapon('knife'); w1.position.set(-6, 0, 0);
            const w2 = createWeapon('sword'); w2.position.set(0, 0, 0);
            const w3 = createWeapon('lightsaber'); w3.position.set(6, 0, 0);
            [w1, w2, w3].forEach(w => initObj(w));
        }

        function spawnShapes() {
            const box = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshPhongMaterial({color: 0x0088ff}));
            initObj(box);
        }

        function spawnEarth() {
            const earth = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), new THREE.MeshPhongMaterial({color: 0x002244, wireframe: true}));
            initObj(earth);
        }

        function initObj(obj) {
            obj.userData.isGrabbed = false;
            scene.add(obj);
            app.objects.push(obj);
        }

        // --- MULTIPLAYER ---
        window.initMultiplayer = function(host) {
            const randomID = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer(host ? 'holo-' + randomID : null);
            peer.on('open', (id) => {
                document.getElementById('setup-controls').style.display = 'none';
                document.getElementById('room-display').style.display = 'block';
                document.getElementById('room-id-text').innerText = id.replace('holo-', '');
                if (!host) setupConnection(peer.connect('holo-' + document.getElementById('join-code').value));
            });
            peer.on('connection', setupConnection);
        };

        function setupConnection(c) {
            conn = c;
            conn.on('data', (data) => {
                if(data.type === 'mode') app.switchMode(data.value, false);
                if(data.type === 'hand') remoteHand.position.set(data.pos.x, data.pos.y, data.pos.z);
                if(data.type === 'sync') {
                    const obj = app.objects[data.index];
                    if(obj) { obj.position.copy(data.pos); obj.rotation.copy(data.rot); }
                }
                if(data.type === 'hit') {
                    myHP -= data.damage;
                    updateHPUI();
                    flashRed();
                }
                if(data.type === 'hp-sync') { enemyHP = data.value; updateHPUI(); }
            });
        }

        function updateHPUI() {
            document.getElementById('my-hp-fill').style.width = myHP + "%";
            document.getElementById('enemy-hp-fill').style.width = enemyHP + "%";
            if(myHP <= 0) alert("YOU DIED!");
        }

        function flashRed() {
            const f = document.getElementById('hit-flash');
            f.style.display = 'block';
            setTimeout(() => f.style.display = 'none', 100);
        }

        // --- HANDS ---
        const handModel = new THREE.Mesh(new THREE.SphereGeometry(0.1), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
        scene.add(handModel);

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.7 });
        hands.onResults((results) => {
            document.getElementById('loading-screen').style.display = 'none';
            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                const lm = results.multiHandLandmarks[0];
                const x = (1 - lm[8].x) * 2 - 1, y = -(lm[8].y * 2 - 1);
                const v = new THREE.Vector3(x, y, 0.5).unproject(camera);
                const dir = v.sub(camera.position).normalize();
                const dist = -camera.position.z / dir.z + (lm[8].z * -15);
                const pos = camera.position.clone().add(dir.multiplyScalar(dist));
                
                handModel.position.copy(pos);
                if(conn) conn.send({type: 'hand', pos: pos});

                const isPinching = Math.hypot(lm[8].x-lm[4].x, lm[8].y-lm[4].y) < 0.05;
                let grabbed = app.objects.find(o => o.userData.isGrabbed);

                if (isPinching) {
                    if (!grabbed) {
                        const ray = new THREE.Raycaster();
                        ray.setFromCamera({x, y}, camera);
                        const hits = ray.intersectObjects(app.objects, true);
                        if(hits.length > 0) {
                            grabbed = hits[0].object;
                            while(grabbed.parent && !app.objects.includes(grabbed)) grabbed = grabbed.parent;
                            grabbed.userData.isGrabbed = true;
                        }
                    } else {
                        grabbed.position.lerp(pos, 0.4);
                        // Rotate weapon to point "up" from hand
                        if(grabbed.userData.isWeapon) grabbed.rotation.z = Math.sin(Date.now()*0.005) * 0.2; 
                        
                        if(conn) conn.send({type: 'sync', index: app.objects.indexOf(grabbed), pos: grabbed.position, rot: grabbed.rotation});

                        // COLLISION DETECTION (Attack)
                        if (grabbed.userData.isWeapon && app.mode === 'duel') {
                            const tip = new THREE.Vector3(0, grabbed.userData.length, 0).applyMatrix4(grabbed.matrixWorld);
                            if (tip.distanceTo(remoteHand.position) < 1.5 && Date.now() - lastHitTime > 1000) {
                                enemyHP -= grabbed.userData.damage;
                                lastHitTime = Date.now();
                                if(conn) {
                                    conn.send({type: 'hit', damage: grabbed.userData.damage});
                                    conn.send({type: 'hp-sync', value: 100 - (100 - enemyHP)}); // Simplified sync
                                }
                                updateHPUI();
                            }
                        }
                    }
                } else if (grabbed) { grabbed.userData.isGrabbed = false; }
            }
        });

        const cam = new Camera(document.getElementById('input_video'), { onFrame: async () => await hands.send({image: document.getElementById('input_video')}), width: 1280, height: 720 });
        cam.start();

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
