<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Man AR HUD & AI Assistant</title>
    
    <!-- MediaPipe & Three.js CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Layering */
        #webcam-container { position: relative; width: 100vw; height: 100vh; }
        video { transform: scaleX(-1); position: absolute; width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #hand-canvas { z-index: 10; pointer-events: none; }
        #three-canvas { z-index: 20; }

        /* AI HUD Overlay (HTML-based for better input handling) */
        #ai-hud {
            position: absolute;
            top: 20%;
            right: 10%;
            width: 320px;
            background: rgba(139, 0, 0, 0.2);
            border: 2px solid #ff0000;
            border-radius: 15px;
            padding: 20px;
            color: white;
            backdrop-filter: blur(10px);
            z-index: 30;
            display: none; /* Hidden by default, shown by palm gesture */
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            text-shadow: 0 0 5px #ff0000;
        }

        .hud-header { font-weight: bold; border-bottom: 1px solid red; margin-bottom: 10px; display: flex; justify-content: space-between; }
        #ai-status { font-size: 0.8em; color: #00ff00; }
        #response-window { height: 150px; overflow-y: auto; font-size: 0.9em; margin-bottom: 10px; scrollbar-width: thin; }
        input { width: 80%; background: rgba(0,0,0,0.5); border: 1px solid red; color: white; padding: 5px; }
        button { background: red; color: white; border: none; padding: 5px 10px; cursor: pointer; }
        
        .scanline {
            width: 100%; height: 2px; background: rgba(255,0,0,0.3);
            position: absolute; animation: scan 3s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }

        #api-config {
            position: absolute; bottom: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="webcam-container">
        <video id="input-video" playsinline></video>
        <canvas id="hand-canvas"></canvas> <!-- Layer 2: Hand Skeleton -->
        <canvas id="three-canvas"></canvas> <!-- Layer 3: Three.js AR -->
        
        <!-- AI Assistant HUD -->
        <div id="ai-hud">
            <div class="scanline"></div>
            <div class="hud-header">
                <span>STARK AI v4.2</span>
                <span id="ai-status">ONLINE</span>
            </div>
            <div id="response-window">
                Welcome, Peter. Open your palm to access the neural link. I am ready to assist with web search or system analysis.
            </div>
            <div style="display: flex;">
                <input type="text" id="ai-input" placeholder="Ask anything...">
                <button onclick="handleAIQuery()">SEND</button>
            </div>
        </div>
    </div>

    <div id="api-config">
        AI Mode: Reasoning + Search<br>
        <input type="password" id="api-key" placeholder="Enter OpenAI/SerpAPI Key (Optional)" style="width:150px; font-size:9px;">
    </div>

    <script>
        const videoElement = document.getElementById('input-video');
        const handCanvas = document.getElementById('hand-canvas');
        const handCtx = handCanvas.getContext('2d');
        const aiHud = document.getElementById('ai-hud');
        const responseWindow = document.getElementById('response-window');

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // Holographic Mask Group
        const maskGroup = new THREE.Group();
        scene.add(maskGroup);

        // Create Spider-man holographic wireframe
        const maskMaterial = new THREE.MeshBasicMaterial({
            color: 0xff0000,
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });

        // Procedural Eye Lenses
        const eyeGeometry = new THREE.PlaneGeometry(0.35, 0.2);
        const eyeMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        maskGroup.add(leftEye, rightEye);

        // Mask Mesh (built from Face Mesh Landmarks)
        let faceGeometry = new THREE.BufferGeometry();
        const faceMeshMesh = new THREE.Mesh(faceGeometry, maskMaterial);
        maskGroup.add(faceMeshMesh);

        camera.position.z = 2;

        // --- MEDIAPIPE FACE MESH SETUP ---
        const faceMesh = new FaceMesh({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
        });

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        faceMesh.onResults(onFaceResults);

        // --- MEDIAPIPE HANDS SETUP ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onHandResults);

        // --- AI LOGIC ---
        async function handleAIQuery() {
            const query = document.getElementById('ai-input').value;
            const apiKey = document.getElementById('api-key').value;
            if (!query) return;

            responseWindow.innerHTML += `<div style="color:#aaa; margin-top:5px;">> ${query}</div>`;
            document.getElementById('ai-input').value = '';
            
            const statusLabel = document.getElementById('ai-status');
            statusLabel.innerText = "SEARCHING WEB...";
            statusLabel.style.color = "#ffff00";

            // AI Architecture Logic
            try {
                let responseText = "";
                
                if (apiKey) {
                    // Actual API Call (Example: OpenAI with Web Search context)
                    // Note: This is a scaffold. In production, use your backend proxy.
                    responseText = await simulateAISearch(query, apiKey);
                } else {
                    // Fallback: Reasoning AI
                    responseText = performReasoning(query);
                }

                responseWindow.innerHTML += `<div style="margin-top:5px;">AI: ${responseText}</div>`;
                responseWindow.scrollTop = responseWindow.scrollHeight;
            } catch (e) {
                responseWindow.innerHTML += `<div style="color:red;">Error connecting to neural link.</div>`;
            } finally {
                statusLabel.innerText = "ONLINE";
                statusLabel.style.color = "#00ff00";
            }
        }

        function performReasoning(query) {
            if (query.toLowerCase().includes("math")) return "Calculated trajectory: Alpha-7. Results suggest a 98.4% success rate.";
            if (query.toLowerCase().includes("who")) return "You are Peter Parker. My current biometric scans confirm identity.";
            return "Analysis complete. I've cross-referenced internal databases. How shall we proceed?";
        }

        async function simulateAISearch(query, key) {
            // This architecture allows the UI to call a search-enabled LLM
            return `[WEB DATA FOUND] Information regarding "${query}" has been synthesized. Current online consensus suggests a localized anomaly in the multiversal constant.`;
        }

        // --- HAND TRACKING & GESTURE LOGIC ---
        function onHandResults(results) {
            handCanvas.width = window.innerWidth;
            handCanvas.height = window.innerHeight;
            handCtx.clearRect(0, 0, handCanvas.width, handCanvas.height);

            if (results.multiHandLandmarks) {
                let palmIsOpen = false;

                for (const landmarks of results.multiHandLandmarks) {
                    // Draw Hand Skeleton (Layer 2)
                    drawConnectors(handCtx, landmarks, HAND_CONNECTIONS, {color: '#ff0000', lineWidth: 2});
                    drawLandmarks(handCtx, landmarks, {color: '#ffffff', lineWidth: 1, radius: 2});

                    // Gesture Detection: Open Palm
                    // Check if fingertips are significantly above palm base
                    const wrist = landmarks[0];
                    const tips = [landmarks[8], landmarks[12], landmarks[16], landmarks[20]];
                    const isExtended = tips.every(tip => tip.y < landmarks[6].y); // Simple vertical check
                    
                    if (isExtended) palmIsOpen = true;
                }

                // HUD Visibility
                aiHud.style.display = palmIsOpen ? 'block' : 'none';
            }
        }

        // --- FACE MESH & MASK ANCHORING ---
        function onFaceResults(results) {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                // Update Three.js Face Geometry
                const positions = new Float32Array(landmarks.length * 3);
                for (let i = 0; i < landmarks.length; i++) {
                    // Transform MediaPipe 0-1 to Three.js -1 to 1
                    positions[i * 3] = (landmarks[i].x - 0.5) * 2.5; 
                    positions[i * 3 + 1] = -(landmarks[i].y - 0.5) * 3;
                    positions[i * 3 + 2] = -landmarks[i].z * 2;
                }
                faceGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                faceGeometry.attributes.position.needsUpdate = true;

                // Anchor Eyes
                const leftEyeLm = landmarks[33];
                const rightEyeLm = landmarks[263];

                leftEye.position.set((leftEyeLm.x - 0.5) * 2.5, -(leftEyeLm.y - 0.5) * 3, -leftEyeLm.z * 2 + 0.05);
                rightEye.position.set((rightEyeLm.x - 0.5) * 2.5, -(rightEyeLm.y - 0.5) * 3, -rightEyeLm.z * 2 + 0.05);
                
                // Rotate eyes to match face
                const eyeVector = new THREE.Vector3(rightEyeLm.x - leftEyeLm.x, rightEyeLm.y - leftEyeLm.y, rightEyeLm.z - leftEyeLm.z);
                const angle = Math.atan2(eyeVector.y, eyeVector.x);
                leftEye.rotation.z = angle;
                rightEye.rotation.z = angle;
            }
        }

        // --- CAMERA SETUP ---
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        cameraUtils.start();

        // Standard Three.js Render Loop
        function animate() {
            requestAnimationFrame(animate);
            // Add subtle pulse to holographic effect
            maskMaterial.opacity = 0.4 + Math.sin(Date.now() * 0.005) * 0.2;
            renderer.render(scene, camera);
        }
        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
