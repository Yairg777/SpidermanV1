<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Holo-Link: Dual-Hand Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; }
        #video_container { position: absolute; width: 100vw; height: 100vh; overflow: hidden; z-index: -1; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* Mobile Sidebar */
        #sidebar { 
            position: absolute; right: 25px; top: 55%; transform: translateY(-50%); 
            display: flex; flex-direction: column; gap: 18px; z-index: 1000; 
        }
        .menu-btn { 
            width: 85px; height: 85px; background: rgba(0, 40, 60, 0.85); 
            border: 2px solid #00f2ff; border-radius: 18px; color: #00f2ff;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; text-align: center;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
            pointer-events: auto; -webkit-tap-highlight-color: transparent;
            transition: 0.2s;
        }
        .menu-btn.active { background: #00f2ff; color: #000; box-shadow: 0 0 30px #00f2ff; }
        .duel-btn { border-color: #ffcc00; color: #ffcc00; }

        /* Multiplayer Hub */
        #multi-hub {
            position: absolute; top: 15px; right: 15px; background: rgba(0,15,25,0.9);
            padding: 12px; border-radius: 12px; border: 1px solid #00f2ff;
            color: #00f2ff; width: 160px; z-index: 1000; font-size: 12px;
            backdrop-filter: blur(8px);
        }
        button { width: 100%; padding: 10px; margin-top: 6px; background: #00f2ff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        input { width: 100%; background: #000; color: #fff; border: 1px solid #00f2ff; padding: 7px; box-sizing: border-box; border-radius: 4px; }

        #duel-header {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: none; text-align: center; color: white; z-index: 100;
        }
        #loading-screen { position: fixed; inset: 0; background: #000; color: #00f2ff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 5000; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loading-screen"><div>INITIALIZING NEURAL LINK...</div></div>

    <div id="duel-header">
        <div style="font-size: 36px; font-weight: bold; color: #ff3300;" id="timer">30</div>
        <div style="background: rgba(0,0,0,0.6); padding: 8px 20px; border-radius: 25px; border: 2px solid #00f2ff; font-weight: bold;">
            YOU: <span id="my-score">0</span> | ENEMY: <span id="peer-score">0</span>
        </div>
    </div>

    <div id="multi-hub">
        <div id="setup">
            <button onclick="initMulti(true)">CREATE ROOM</button>
            <input type="text" id="join-code" placeholder="4-DIGIT CODE" style="margin-top:8px">
            <button onclick="initMulti(false)">JOIN ROOM</button>
        </div>
        <div id="room-info" style="display:none; text-align: center;">
            ID: <span id="room-id" style="color:white; font-size: 16px;">--</span>
            <div style="font-size: 9px; margin-top: 5px; color: #00ff88;">● LINK ACTIVE</div>
        </div>
    </div>

    <div id="sidebar">
        <div class="menu-btn active" id="btn-shapes" onclick="app.switchMode('shapes')">SHAPES</div>
        <div class="menu-btn" id="btn-earth" onclick="app.switchMode('earth')">EARTH</div>
        <div class="menu-btn duel-btn" id="btn-duel" onclick="app.startDuel()">DUEL</div>
    </div>

    <div id="video_container"><video id="input_video" autoplay playsinline muted></video></div>

<script>
    const app = {
        objects: [], fallingObjects: [], mode: 'shapes', 
        myScore: 0, peerScore: 0, timer: 30, isDuelActive: false, winner: null,
        initialDist: 0, initialScale: 1,
        grabbingHandIdx: -1 // Tracks which hand is currently the primary "grabber"
    };

    let peer, conn, isHost = false;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 12;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const light = new THREE.PointLight(0x00f2ff, 1200);
    light.position.set(10, 10, 10);
    scene.add(light);

    const connections = [[0, 1, 2, 3, 4], [0, 5, 6, 7, 8], [5, 9, 10, 11, 12], [9, 13, 14, 15, 16], [13, 17, 18, 19, 20], [0, 17]];

    function createHandModel(color) {
        const group = new THREE.Group();
        const joints = [];
        const lines = [];
        for (let i = 0; i < 21; i++) {
            const j = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({ color }));
            joints.push(j); group.add(j);
        }
        connections.forEach(indices => {
            const line = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.6 }));
            lines.push({ line, indices }); group.add(line);
        });
        scene.add(group);
        return { group, joints, lines };
    }

    const myHands = [createHandModel(0x00f2ff), createHandModel(0x00f2ff)];
    const peerHands = [createHandModel(0xff0055), createHandModel(0xff0055)];
    peerHands.forEach(h => h.group.visible = false);

    function initObj(mesh, x, y) {
        mesh.position.set(x, y, 0);
        mesh.userData = { 
            vel: new THREE.Vector3((Math.random()-0.5)*0.02, (Math.random()-0.5)*0.02, 0),
            rotVel: new THREE.Vector3(Math.random()*0.01, Math.random()*0.01, 0),
            isGrabbed: false, drift: Math.random() * Math.PI * 2
        };
        scene.add(mesh); app.objects.push(mesh);
    }

    app.switchMode = (m, broadcast = true) => {
        app.mode = m; app.isDuelActive = false; app.winner = null;
        document.getElementById('duel-header').style.display = 'none';
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + (m === 'duel' ? 'duel' : m)).classList.add('active');
        app.objects.forEach(o => scene.remove(o)); app.objects = [];
        app.fallingObjects.forEach(o => scene.remove(o)); app.fallingObjects = [];
        if (m === 'shapes') {
            const geos = [new THREE.IcosahedronGeometry(1.5), new THREE.TorusGeometry(1, 0.3, 16, 32), new THREE.BoxGeometry(1.8, 1.8, 1.8), new THREE.OctahedronGeometry(1.5)];
            geos.forEach((g, i) => initObj(new THREE.Mesh(g, new THREE.MeshPhongMaterial({color: 0x0088ff, emissive: 0x002244, transparent: true, opacity: 0.85})), (i-1.5)*4, 0));
        } else if (m === 'earth') {
            initObj(new THREE.Mesh(new THREE.SphereGeometry(3.5, 32, 32), new THREE.MeshPhongMaterial({color: 0x00f2ff, wireframe: true})), 0, 0);
        }
        if (broadcast && conn) conn.send({type: 'mode', value: m});
    };

    app.startDuel = () => { if(conn) { conn.send({type: 'duel-start'}); startDuelLogic(); } else alert("Link a partner first!"); };

    function startDuelLogic() {
        app.switchMode('duel', false); app.isDuelActive = true; app.myScore = 0; app.peerScore = 0; app.timer = 30;
        document.getElementById('duel-header').style.display = 'block';
        const timerInt = setInterval(() => {
            app.timer--; document.getElementById('timer').innerText = app.timer;
            if(isHost && app.timer > 0) spawnFalling((Math.random()-0.5)*16, Math.random().toString(36), true);
            if(app.timer <= 0) {
                clearInterval(timerInt);
                if(isHost) {
                    const win = app.myScore > app.peerScore ? 'host' : 'guest';
                    conn.send({type: 'game-over', winner: win}); endDuel(win);
                }
            }
        }, 1000);
    }

    function spawnFalling(x, id, broadcast) {
        const m = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshPhongMaterial({color: 0xffcc00}));
        m.position.set(x, 10, 0); m.userData = { id };
        scene.add(m); app.fallingObjects.push(m);
        if(broadcast && conn) conn.send({type: 'spawn', x, id});
    }

    function endDuel(win) {
        app.isDuelActive = false;
        if(win === 'host') app.winner = isHost ? 'me' : 'peer';
        else app.winner = isHost ? 'peer' : 'me';
    }

    function initMulti(host) {
        isHost = host;
        const id = Math.floor(1000 + Math.random()*9000).toString();
        peer = new Peer(host ? 'holo-'+id : null);
        peer.on('open', (id) => {
            document.getElementById('setup').style.display='none';
            document.getElementById('room-info').style.display='block';
            document.getElementById('room-id').innerText = id.replace('holo-','');
            if(!host) setupConn(peer.connect('holo-'+document.getElementById('join-code').value));
        });
        peer.on('connection', setupConn);
    }

    function setupConn(c) {
        conn = c;
        conn.on('data', d => {
            if(d.type === 'mode') app.switchMode(d.value, false);
            if(d.type === 'hand') {
                const h = peerHands[d.idx]; h.group.visible = true;
                d.pos.forEach((p, i) => h.joints[i].position.set(p.x, p.y, p.z));
                h.lines.forEach(l => l.line.geometry.setFromPoints(l.indices.map(idx => h.joints[idx].position)));
            }
            if(d.type === 'sync') { 
                const o = app.objects[d.i]; 
                if(o) { o.position.copy(d.p); o.rotation.copy(d.r); o.scale.setScalar(d.s); }
            }
            if(d.type === 'duel-start') startDuelLogic();
            if(d.type === 'spawn') spawnFalling(d.x, d.id, false);
            if(d.type === 'slap') { const o = app.fallingObjects.find(f=>f.userData.id === d.id); if(o) { scene.remove(o); app.fallingObjects.splice(app.fallingObjects.indexOf(o),1); } }
            if(d.type === 'score') { app.peerScore = d.v; document.getElementById('peer-score').innerText=d.v; }
            if(d.type === 'game-over') endDuel(d.winner);
        });
    }

    const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7 });
    
    hands.onResults(res => {
        document.getElementById('loading-screen').style.display = 'none';
        myHands.forEach(h => h.group.visible = false);

        if (res.multiHandLandmarks) {
            const handData = [];
            
            res.multiHandLandmarks.forEach((lm, idx) => {
                const hModel = myHands[idx];
                hModel.group.visible = true;
                const joints = lm.map(l => {
                    const x = (1 - l.x) * 2 - 1, y = -(l.y * 2 - 1);
                    const v = new THREE.Vector3(x, y, 0.5).unproject(camera);
                    const dist = -camera.position.z / v.sub(camera.position).normalize().z + (l.z * -15);
                    return camera.position.clone().add(v.normalize().multiplyScalar(dist));
                });

                joints.forEach((p, i) => hModel.joints[i].position.lerp(p, 0.5));
                hModel.lines.forEach(l => l.line.geometry.setFromPoints(l.indices.map(i => hModel.joints[i].position)));

                const indexTip = hModel.joints[8].position;
                const thumbTip = hModel.joints[4].position;
                const pinching = indexTip.distanceTo(thumbTip) < 0.9; // Increased threshold for stability
                handData.push({ indexTip, pinching, idx });

                if(conn) conn.send({type: 'hand', idx, pos: hModel.joints.map(j => j.position)});
            });

            let grabbed = app.objects.find(o => o.userData.isGrabbed);

            // GESTURE LOGIC: One hand grabs, other hand resizes
            if (handData.length === 2) {
                const h0 = handData[0];
                const h1 = handData[1];

                // If no object is grabbed, try to grab with either hand
                if (!grabbed) {
                    if (h0.pinching) {
                        app.objects.forEach(o => { if(h0.indexTip.distanceTo(o.position) < 2.5) { grabbed = o; o.userData.isGrabbed = true; app.grabbingHandIdx = 0; }});
                    } else if (h1.pinching) {
                        app.objects.forEach(o => { if(h1.indexTip.distanceTo(o.position) < 2.5) { grabbed = o; o.userData.isGrabbed = true; app.grabbingHandIdx = 1; }});
                    }
                }

                if (grabbed) {
                    const primaryHand = handData.find(h => h.idx === app.grabbingHandIdx);
                    const secondaryHand = handData.find(h => h.idx !== app.grabbingHandIdx);

                    if (primaryHand && primaryHand.pinching) {
                        // Move with primary hand
                        const prev = grabbed.position.clone();
                        grabbed.position.lerp(primaryHand.indexTip, 0.3);
                        grabbed.userData.vel.copy(grabbed.position).sub(prev);

                        // If secondary hand is also pinching, RESIZE based on distance between hands
                        if (secondaryHand && secondaryHand.pinching) {
                            const d = primaryHand.indexTip.distanceTo(secondaryHand.indexTip);
                            if (app.initialDist === 0) {
                                app.initialDist = d; 
                                app.initialScale = grabbed.scale.x;
                            } else {
                                const s = (d / app.initialDist) * app.initialScale;
                                grabbed.scale.setScalar(Math.max(0.2, Math.min(s, 5)));
                            }
                        } else {
                            app.initialDist = 0; // Reset anchor if secondary hand stops pinching
                        }
                    } else {
                        // Drop if primary hand stops pinching
                        grabbed.userData.isGrabbed = false;
                        app.initialDist = 0;
                        app.grabbingHandIdx = -1;
                    }
                }
            } else if (handData.length === 1) {
                // Single hand behavior
                const h = handData[0];
                if (h.pinching) {
                    if (!grabbed) {
                        app.objects.forEach(o => { if(h.indexTip.distanceTo(o.position) < 2.5) { grabbed = o; o.userData.isGrabbed = true; app.grabbingHandIdx = h.idx; }});
                    }
                    if (grabbed) {
                        const prev = grabbed.position.clone();
                        grabbed.position.lerp(h.indexTip, 0.3);
                        grabbed.userData.vel.copy(grabbed.position).sub(prev);
                    }
                } else if (grabbed) {
                    grabbed.userData.isGrabbed = false;
                    app.grabbingHandIdx = -1;
                }
                app.initialDist = 0;
            } else {
                if (grabbed) grabbed.userData.isGrabbed = false;
                app.grabbingHandIdx = -1;
                app.initialDist = 0;
            }

            if (grabbed && conn) {
                conn.send({type: 'sync', i: app.objects.indexOf(grabbed), p: grabbed.position, r: grabbed.rotation, s: grabbed.scale.x});
            }

            // Duel Slap
            if (app.isDuelActive) {
                handData.forEach(h => {
                    app.fallingObjects.forEach(o => {
                        if (h.indexTip.distanceTo(o.position) < 1.5) {
                            app.myScore++; document.getElementById('my-score').innerText = app.myScore;
                            scene.remove(o); app.fallingObjects.splice(app.fallingObjects.indexOf(o), 1);
                            if(conn) { conn.send({type: 'slap', id: o.userData.id}); conn.send({type: 'score', v: app.myScore}); }
                        }
                    });
                });
            }
        }
    });

    new Camera(document.getElementById('input_video'), {
        onFrame: async () => await hands.send({ image: document.getElementById('input_video') }),
        width: 1280, height: 720
    }).start();

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;

        if (app.winner) {
            const hue = (time * 0.5) % 1;
            const target = app.winner === 'me' ? myHands : peerHands;
            target.forEach(h => {
                h.joints.forEach(j => j.material.color.setHSL(hue, 1, 0.5));
                h.lines.forEach(l => l.line.material.color.setHSL(hue, 1, 0.5));
            });
        }

        if (app.isDuelActive) app.fallingObjects.forEach(o => { o.position.y -= 0.12; o.rotation.x += 0.05; });

        app.objects.forEach(o => {
            if (!o.userData.isGrabbed) {
                o.position.add(o.userData.vel);
                o.rotation.x += o.userData.rotVel.x; o.rotation.y += o.userData.rotVel.y;
                o.position.y += Math.sin(time + o.userData.drift) * 0.006;
                o.userData.vel.multiplyScalar(0.98);
                if (Math.abs(o.position.x) > 18) o.userData.vel.x *= -1;
                if (Math.abs(o.position.y) > 12) o.userData.vel.y *= -1;
            }
        });

        renderer.render(scene, camera);
    }
    app.switchMode('shapes');
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
