<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holo-Link Multiplayer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }
        #video_container { position: absolute; width: 100vw; height: 100vh; overflow: hidden; z-index: -1; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        canvas { display: block; position: absolute; top: 0; left: 0; }

        /* UI Overlays */
        #ui { position: absolute; top: 30px; left: 30px; color: #00f2ff; pointer-events: none; }
        
        /* MULTIPLAYER TAB - TOP RIGHT */
        #multiplayer-hub {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 20, 30, 0.8);
            border: 1px solid #00f2ff;
            padding: 15px;
            border-radius: 10px;
            color: #00f2ff;
            backdrop-filter: blur(10px);
            width: 200px;
            z-index: 20;
        }
        .mp-title { font-size: 10px; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.7; }
        #room-display { font-size: 18px; font-weight: bold; margin-bottom: 10px; display: none;}
        input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid #00f2ff; 
            color: white; padding: 5px; box-sizing: border-box; margin-bottom: 5px;
        }
        button {
            width: 100%; padding: 8px; background: #00f2ff; border: none; 
            cursor: pointer; font-weight: bold; margin-top: 5px; transition: 0.3s;
        }
        button:hover { background: #fff; }
        #connection-status { font-size: 10px; margin-top: 8px; color: #00ff88; display: none; }

        /* SIDEBAR */
        #sidebar {
            position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px;
        }
        .menu-btn {
            width: 70px; height: 70px; background: rgba(0, 20, 30, 0.6);
            border: 1px solid #00f2ff; border-radius: 8px; color: #00f2ff;
            cursor: pointer; display: flex; flex-direction: column; align-items: center;
            justify-content: center; font-size: 9px; transition: 0.3s;
        }
        .menu-btn.active { background: #00f2ff; color: #000; }

        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #00f2ff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0, 242, 255, 0.2); border-top: 3px solid #00f2ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div>INITIALIZING NEURAL LINK...</div>
    </div>

    <div id="multiplayer-hub">
        <div class="mp-title">MULTIPLAYER HUB</div>
        <div id="setup-controls">
            <button onclick="initMultiplayer(true)">CREATE ROOM</button>
            <div style="margin: 10px 0; text-align: center; font-size: 10px;">- OR -</div>
            <input type="text" id="join-code" placeholder="ENTER 4-DIGIT CODE">
            <button onclick="initMultiplayer(false)">JOIN ROOM</button>
        </div>
        <div id="room-display">ROOM: <span id="room-id-text">----</span></div>
        <div id="connection-status">● CONNECTED TO PEER</div>
    </div>

    <div id="ui">
        <h1 style="margin:0; font-weight: 300; font-size: 24px;">HOLO-LINK <span style="font-size: 12px; opacity: 0.7;">v6.0 MP</span></h1>
        <div id="hand-count" style="font-size: 12px; margin-top: 5px; color: #00f2ff; border: 1px solid #00f2ff; padding: 2px 8px; display: inline-block; border-radius: 10px;">SEARCHING...</div>
    </div>

    <div id="sidebar">
        <div class="menu-btn active" id="btn-shapes" onclick="app.switchMode('shapes')">SHAPES</div>
        <div class="menu-btn" id="btn-earth" onclick="app.switchMode('earth')">EARTH</div>
        <div class="menu-btn" id="btn-vehicles" onclick="app.switchMode('vehicles')">VEHICLES</div>
    </div>

    <div id="video_container">
        <video id="input_video" autoplay playsinline></video>
    </div>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- MULTIPLAYER LOGIC ---
        let peer = null;
        let conn = null;
        let isHost = false;
        const remoteHand = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xff0055}));
        remoteHand.visible = false;

        window.initMultiplayer = function(host) {
            isHost = host;
            const randomID = Math.floor(1000 + Math.random() * 9000).toString();
            const peerID = host ? 'holo-' + randomID : null;
            
            peer = new Peer(peerID);
            
            peer.on('open', (id) => {
                document.getElementById('setup-controls').style.display = 'none';
                document.getElementById('room-display').style.display = 'block';
                document.getElementById('room-id-text').innerText = id.replace('holo-', '');
                
                if (!host) {
                    const target = 'holo-' + document.getElementById('join-code').value;
                    const c = peer.connect(target);
                    setupConnection(c);
                }
            });

            peer.on('connection', (c) => {
                setupConnection(c);
            });
        };

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                document.getElementById('connection-status').style.display = 'block';
                // Sync current mode
                if(isHost) conn.send({type: 'mode', value: app.mode});
            });
            conn.on('data', (data) => {
                if(data.type === 'mode') app.switchMode(data.value, false);
                if(data.type === 'hand') {
                    remoteHand.visible = true;
                    remoteHand.position.set(data.pos.x, data.pos.y, data.pos.z);
                }
                if(data.type === 'sync') {
                    const obj = app.objects[data.index];
                    if(obj) {
                        obj.position.copy(data.pos);
                        obj.rotation.copy(data.rot);
                        obj.scale.set(data.scale, data.scale, data.scale);
                    }
                }
            });
        }

        // --- THREE.JS & APP LOGIC ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 12;
        scene.add(remoteHand);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const pLight = new THREE.PointLight(0x00f2ff, 500);
        pLight.position.set(10, 10, 10);
        scene.add(pLight);

        window.app = {
            objects: [],
            mode: 'shapes',
            switchMode: (newMode, broadcast = true) => {
                app.mode = newMode;
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-' + newMode).classList.add('active');
                
                app.objects.forEach(o => scene.remove(o));
                app.objects = [];
                
                if(newMode === 'shapes') spawnShapes();
                if(newMode === 'earth') spawnEarth();
                if(newMode === 'vehicles') spawnVehicles();
                
                if(broadcast && conn) conn.send({type: 'mode', value: newMode});
            }
        };

        function spawnShapes() {
            const geos = [new THREE.BoxGeometry(2,2,2), new THREE.IcosahedronGeometry(1.5), new THREE.TorusGeometry(1, 0.4, 16, 32)];
            for(let i=0; i<3; i++) {
                const m = new THREE.Mesh(geos[i], new THREE.MeshPhongMaterial({color: 0x0088ff, transparent: true, opacity: 0.7}));
                m.position.x = (i - 1) * 4;
                initObj(m);
            }
        }

        function spawnEarth() {
            const group = new THREE.Group();
            const ocean = new THREE.Mesh(new THREE.SphereGeometry(3, 32, 32), new THREE.MeshPhongMaterial({color: 0x002244, transparent: true, opacity: 0.8}));
            const land = new THREE.Mesh(new THREE.SphereGeometry(3.05, 32, 32), new THREE.MeshPhongMaterial({color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.4}));
            group.add(ocean, land);
            initObj(group);
        }

        function spawnVehicles() {
            // Plane
            const plane = new THREE.Group();
            plane.add(new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 1), new THREE.MeshPhongMaterial({color: 0x00ff88})));
            plane.add(new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 4), new THREE.MeshPhongMaterial({color: 0x00ff88})));
            plane.position.x = -4;
            initObj(plane);

            // Tank
            const tank = new THREE.Group();
            tank.add(new THREE.Mesh(new THREE.BoxGeometry(3, 1.2, 2), new THREE.MeshPhongMaterial({color: 0xffaa00})));
            tank.add(new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 3), new THREE.MeshPhongMaterial({color: 0xffaa00})).rotateZ(Math.PI/2).position.set(2,0.5,0));
            tank.position.x = 4;
            initObj(tank);
        }

        function initObj(obj) {
            obj.userData = { velocity: new THREE.Vector3(), isGrabbed: false };
            scene.add(obj);
            app.objects.push(obj);
        }

        // --- HANDS & INTERACTION ---
        const handModel = createHandModel();
        function createHandModel() {
            const g = new THREE.Group();
            const joints = [];
            for(let i=0; i<21; i++) {
                const j = new THREE.Mesh(new THREE.SphereGeometry(0.08), new THREE.MeshBasicMaterial({color: 0x00f2ff}));
                joints.push(j); g.add(j);
            }
            scene.add(g); return { group: g, joints };
        }

        const raycaster = new THREE.Raycaster();
        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7 });

        hands.onResults((results) => {
            document.getElementById('loading-screen').style.display = 'none';
            handModel.group.visible = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                document.getElementById('hand-count').innerText = "LINK ACTIVE";
                handModel.group.visible = true;
                const landmarks = results.multiHandLandmarks[0];
                
                // Map hand to 3D
                const worldJoints = landmarks.map(lm => {
                    const x = (1 - lm.x) * 2 - 1;
                    const y = -(lm.y * 2 - 1);
                    const v = new THREE.Vector3(x, y, 0.5).unproject(camera);
                    const dir = v.sub(camera.position).normalize();
                    const dist = -camera.position.z / dir.z + (lm.z * -15);
                    return camera.position.clone().add(dir.multiplyScalar(dist));
                });

                worldJoints.forEach((pos, i) => handModel.joints[i].position.copy(pos));
                const indexTip = worldJoints[8];
                const isPinching = indexTip.distanceTo(worldJoints[4]) < 0.8;

                // Send hand pos to Peer
                if(conn) conn.send({type: 'hand', pos: indexTip});

                // Grab logic
                const screenX = (1 - landmarks[8].x) * 2 - 1;
                const screenY = -(landmarks[8].y * 2 - 1);
                raycaster.setFromCamera({x: screenX, y: screenY}, camera);
                const intersects = raycaster.intersectObjects(app.objects, true);

                let myGrabbed = app.objects.find(o => o.userData.isGrabbed);

                if (isPinching) {
                    if (!myGrabbed && intersects.length > 0) {
                        let target = intersects[0].object;
                        while(target.parent && !app.objects.includes(target)) target = target.parent;
                        target.userData.isGrabbed = true;
                    } else if (myGrabbed) {
                        myGrabbed.position.lerp(indexTip, 0.3);
                        // Send position sync
                        if(conn) {
                            conn.send({
                                type: 'sync',
                                index: app.objects.indexOf(myGrabbed),
                                pos: myGrabbed.position,
                                rot: myGrabbed.rotation,
                                scale: myGrabbed.scale.x
                            });
                        }
                    }
                } else if (myGrabbed) {
                    myGrabbed.userData.isGrabbed = false;
                }
            }
        });

        const camMP = new Camera(document.getElementById('input_video'), {
            onFrame: async () => { await hands.send({ image: document.getElementById('input_video') }); },
            width: 1280, height: 720
        });
        camMP.start();

        function animate() {
            requestAnimationFrame(animate);
            app.objects.forEach(obj => {
                if (!obj.userData.isGrabbed) {
                    obj.rotation.y += 0.01;
                }
            });
            renderer.render(scene, camera);
        }

        app.switchMode('shapes');
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
